name: Lighthouse CI

on:
  push:
    branches: [main]
    paths:
      - 'weeks/week-04-performance/lab-dashboard/**'
  pull_request:
    branches: [main]
    paths:
      - 'weeks/week-04-performance/lab-dashboard/**'

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: weeks/week-04-performance/lab-dashboard

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: weeks/week-04-performance/lab-dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build

      - name: Run Lighthouse CI
        run: npx lhci autorun
        # Los resultados se guardan en .lighthouseci/ (filesystem, sin servidor remoto)
        # El job falla si alguna aserción de tipo "error" no se cumple (LCP, CLS, TTI)
